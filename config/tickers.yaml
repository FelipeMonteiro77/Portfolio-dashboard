# Portfolio Dashboard v2 — universe config
#
# Single source of truth for the dashboard.
# Adding a name = appending a block here and clicking "Reload" in the UI
# (or POST /api/tickers from the "+ Add Ticker" modal).
#
# Schema per entry:
#   ticker          : symbol shown in the UI (also the dict key)
#   bbg_ticker      : Bloomberg ticker (defaults to "<ticker> US Equity" if omitted)
#   name            : display name
#   sector          : free-text sector label (drives Screen tab filter)
#   in_screen       : show on the Screen watchlist tab (default true)
#   in_valuation    : show on the Valuation EPS tracker (default false)
#   weight          : optional portfolio weight (0–1)
#   capstone_eps    : Capstone in-house estimates ({"26": x, "27": y})
#   px_seed         : fallback price (used when both BBG and Yahoo are unreachable)
#   range_52w       : { low, high } 52-week range fallback
#   mkt_cap_b       : market cap (USD bn) fallback
#   tweet_cashtag_only : if true, only $TICKER matches in tweets (avoids common-word collisions)
#   search_aliases  :
#     email         : list of strings to OR-search Outlook (subject/body)
#     tweet         : list of strings to OR-search the local tweet corpus

