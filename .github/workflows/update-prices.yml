name: Update Screen Prices

on:
  schedule:
    - cron: '0 13,21 * * 1-5'   # 10AM and 6PM ET on weekdays
  workflow_dispatch:              # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch prices and update index.html
        run: python update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No price changes, skipping commit."
          else
            git commit -m "Auto-update SCREEN_WL prices ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
